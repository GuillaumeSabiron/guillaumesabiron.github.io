<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10243e">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="description" content="{{ 'Compétences de Guillaume Sabiron : systèmes, science, produits et leadership.' if lang == 'fr' else 'Guillaume Sabiron skills across systems, science, products and leadership.' }}">
  <link rel="canonical" href="{{ site_url }}{{ '/fr/skills/' if lang == 'fr' else '/skills/' }}">
  <meta property="og:type" content="website"><meta property="og:site_name" content="Guillaume Sabiron"><meta property="og:locale" content="{{ 'fr_FR' if lang == 'fr' else 'en_US' }}"><meta property="og:locale:alternate" content="{{ 'en_US' if lang == 'fr' else 'fr_FR' }}"><meta property="og:title" content="{{ 'Compétences' if lang == 'fr' else 'Skills' }} · Guillaume Sabiron"><meta property="og:description" content="{{ 'Compétences de Guillaume Sabiron : systèmes, science, produits et leadership.' if lang == 'fr' else 'Guillaume Sabiron skills across systems, science, products and leadership.' }}"><meta property="og:url" content="{{ site_url }}{{ '/fr/skills/' if lang == 'fr' else '/skills/' }}"><meta property="og:image" content="{{ site_url }}/static/img/og-guillaume-sabiron.png"><meta property="og:image:alt" content="{{ 'Portrait de Guillaume Sabiron' if lang == 'fr' else 'Portrait of Guillaume Sabiron' }}">
  <meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="{{ 'Compétences' if lang == 'fr' else 'Skills' }} · Guillaume Sabiron"><meta name="twitter:description" content="{{ 'Compétences de Guillaume Sabiron : systèmes, science, produits et leadership.' if lang == 'fr' else 'Guillaume Sabiron skills across systems, science, products and leadership.' }}"><meta name="twitter:image" content="{{ site_url }}/static/img/og-guillaume-sabiron.png">
  <link rel="alternate" hreflang="en" href="{{ site_url }}/skills/"><link rel="alternate" hreflang="fr" href="{{ site_url }}/fr/skills/"><link rel="alternate" hreflang="x-default" href="{{ site_url }}/skills/">
  <title>{{ 'Compétences' if lang == 'fr' else 'Skills' }} · Guillaume Sabiron</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/portfolio-overrides.css') }}">
  {% include 'analytics.html' %}
  <script src="{{ url_for('static', filename='js/scripts.js') }}" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">{{ 'Aller au contenu principal' if lang == 'fr' else 'Skip to main content' }}</a>
  <header class="site-header">
    <a class="site-name" href="{{ url_for('home', lang=lang) }}">Guillaume Sabiron</a>
    <nav class="site-menu site-menu-static" aria-label="{{ 'Navigation principale' if lang == 'fr' else 'Main navigation' }}">
      <a href="{{ url_for('home', lang=lang) }}#capabilities">{{ 'Retour au site' if lang == 'fr' else 'Back to site' }}</a>
      <span class="language-switcher" aria-label="{{ 'Sélecteur de langue' if lang == 'fr' else 'Language selector' }}"><a class="{{ 'is-active' if lang == 'en' else '' }}" href="{{ url_for('skills', lang='en') }}" hreflang="en" lang="en"{% if lang == 'en' %} aria-current="true"{% endif %}>EN</a><a class="{{ 'is-active' if lang == 'fr' else '' }}" href="{{ url_for('skills', lang='fr') }}" hreflang="fr" lang="fr"{% if lang == 'fr' %} aria-current="true"{% endif %}>FR</a></span>
    </nav>
  </header>
  <main id="main-content" class="section" tabindex="-1"><div class="content">{% include 'skills.html' %}</div></main>
  {% include 'footer.html' %}
  {% include 'analytics_notice.html' %}
</body>
</html>
