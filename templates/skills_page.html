<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ 'Compétences de Guillaume Sabiron : systèmes, science, produits et leadership.' if lang == 'fr' else 'Guillaume Sabiron skills across systems, science, products and leadership.' }}">
  <link rel="canonical" href="{{ site_url }}{{ '/fr/skills/' if lang == 'fr' else '/skills/' }}">
  <meta property="og:type" content="website"><meta property="og:title" content="{{ 'Compétences' if lang == 'fr' else 'Skills' }} · Guillaume Sabiron"><meta property="og:description" content="{{ 'Compétences de Guillaume Sabiron : systèmes, science, produits et leadership.' if lang == 'fr' else 'Guillaume Sabiron skills across systems, science, products and leadership.' }}"><meta property="og:url" content="{{ site_url }}{{ '/fr/skills/' if lang == 'fr' else '/skills/' }}"><meta property="og:image" content="{{ site_url }}/static/img/og-guillaume-sabiron.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="alternate" hreflang="en" href="{{ site_url }}/skills/"><link rel="alternate" hreflang="fr" href="{{ site_url }}/fr/skills/"><link rel="alternate" hreflang="x-default" href="{{ site_url }}/skills/">
  <title>{{ 'Compétences' if lang == 'fr' else 'Skills' }} · Guillaume Sabiron</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/portfolio-overrides.css') }}">
  <script src="{{ url_for('static', filename='js/scripts.js') }}" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="site-name" href="{{ url_for('home', lang=lang) }}">Guillaume Sabiron</a>
    <nav class="site-menu site-menu-static" aria-label="{{ 'Navigation principale' if lang == 'fr' else 'Main navigation' }}">
      <a href="{{ url_for('home', lang=lang) }}#capabilities">{{ 'Retour au site' if lang == 'fr' else 'Back to site' }}</a>
      <span class="language-switcher" aria-label="Language selector"><a class="{{ 'is-active' if lang == 'en' else '' }}" href="{{ url_for('skills', lang='en') }}" hreflang="en">EN</a><a class="{{ 'is-active' if lang == 'fr' else '' }}" href="{{ url_for('skills', lang='fr') }}" hreflang="fr">FR</a></span>
    </nav>
  </header>
  <main class="section"><div class="content">{% include 'skills.html' %}</div></main>
  {% include 'footer.html' %}
</body>
</html>
